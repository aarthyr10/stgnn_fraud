[theme]
# Light theme with an Anthropic-leaning palette that matches the
# architecture-diagram swatches used inside the app.
base = "light"
primaryColor = "#534AB7"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F6F5F1"
textColor = "#14140F"
font = "sans serif"

[server]
headless = true
runOnSave = false
fileWatcherType = "none"

[browser]
gatherUsageStats = false

[client]
toolbarMode = "minimal"
showErrorDetails = true
